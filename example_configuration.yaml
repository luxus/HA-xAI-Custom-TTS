# Example Configuration for xAI Custom TTS

# Add to your configuration.yaml or use the UI:
# Settings → Devices & Services → Add Integration → xAI Custom TTS

# After setup, you can use the TTS service in automations:

automation:
  - alias: "Morning Announcement with xAI"
    trigger:
      - platform: time
        at: "07:00:00"
    action:
      - service: tts.speak
        data:
          entity_id: tts.xai_custom_tts
          message: "Good morning! Today is {{ now().strftime('%A, %B %d') }}."
          media_player_entity_id: media_player.bedroom_speaker
          options:
            voice: "ara"  # Warm, friendly female voice
            language: "en"
            codec: "mp3"
            sample_rate: 24000

  - alias: "Security Alert"
    trigger:
      - platform: state
        entity_id: binary_sensor.front_door
        to: "on"
    action:
      - service: tts.speak
        data:
          entity_id: tts.xai_custom_tts
          message: "Security alert: Front door has been opened."
          media_player_entity_id: media_player.living_room_speaker
          options:
            voice: "leo"  # Authoritative male voice
            language: "en"

  - alias: "Telephony Announcement"
    trigger:
      - platform: state
        entity_id: input_boolean.pbx_announcement
        to: "on"
    action:
      - service: tts.speak
        data:
          entity_id: tts.xai_custom_tts
          message: "You have reached the after-hours line."
          media_player_entity_id: media_player.pbx_gateway
          options:
            voice: "sal"  # Neutral voice
            codec: "mulaw"  # G.711 μ-law for telephony
            sample_rate: 8000  # Standard telephony rate

  - alias: "Spanish Announcement"
    trigger:
      - platform: time
        at: "12:00:00"
    action:
      - service: tts.speak
        data:
          entity_id: tts.xai_custom_tts
          message: "Buenas tardes. Es la hora del almuerzo."
          media_player_entity_id: media_player.kitchen_speaker
          options:
            voice: "eve"
            language: "es-MX"  # Spanish (Mexico)

  - alias: "High Quality Audio"
    trigger:
      - platform: state
        entity_id: input_boolean.announce_important
        to: "on"
    action:
      - service: tts.speak
        data:
          entity_id: tts.xai_custom_tts
          message: "Important announcement with high quality audio."
          media_player_entity_id: media_player.hifi_system
          options:
            voice: "rex"
            codec: "wav"  # Uncompressed audio
            sample_rate: 44100  # CD quality

# Get available voices
script:
  get_xai_voices:
    sequence:
      - service: xai_custom_tts.get_voices
        data:
          search_text: "female"

# Using voice profiles (set up in the integration UI)
automation:
  - alias: "Bedtime Story"
    trigger:
      - platform: time
        at: "20:00:00"
    action:
      - service: tts.speak
        data:
          entity_id: tts.xai_custom_tts
          message: "Once upon a time..."
          media_player_entity_id: media_player.kids_room_speaker
          options:
            voice_profile: "Storyteller"  # Use a saved profile

# Auto-language detection
automation:
  - alias: "Multi-Language Greeting"
    trigger:
      - platform: state
        entity_id: input_button.greet
    action:
      - service: tts.speak
        data:
          entity_id: tts.xai_custom_tts
          message: "Welcome! Bienvenue! Willkommen!"
          media_player_entity_id: media_player.entrance_speaker
          options:
            voice: "eve"
            language: "auto"  # Auto-detect language from text
